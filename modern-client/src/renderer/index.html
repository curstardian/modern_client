<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; script-src 'self'" />
<title>Modern Client</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-light">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo-img" src="assets/logo.png" alt="Modern Client" />
        <div class="brand-name">Modern Client</div>
      </div>

      <button class="account-switcher" id="account-switcher">
        <div class="account-avatar" id="account-avatar">?</div>
        <div class="account-info">
          <div class="account-label" data-i18n="account.label">계정</div>
          <div class="account-name" id="account-name">계정 없음</div>
        </div>
      </button>

      <nav class="nav">
        <button class="nav-item active" data-view="home">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M3 9.5 10 3l7 6.5"/><path d="M5 8.5V17h10V8.5"/><path d="M8 17v-5h4v5"/></svg>
          </span>
          <span data-i18n="nav.home">Home</span>
        </button>
        <button class="nav-item" data-view="instances">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
          </span>
          <span data-i18n="nav.instances">Instances</span>
        </button>
        <button class="nav-item" data-view="mods" id="nav-mods" hidden>
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M7 4h3v2.2a1.4 1.4 0 0 0 2.6.9 1.4 1.4 0 0 1 2.6.9V10h2v3H16v2.2a1.4 1.4 0 0 1-2.6.9 1.4 1.4 0 0 0-2.6.9V17H4V4h3Z"/></svg>
          </span>
          <span data-i18n="nav.mods">Mods</span>
        </button>
        <button class="nav-item" data-view="resourcepacks">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="4" width="14" height="12" rx="1.5"/><circle cx="7.5" cy="8.5" r="1.4"/><path d="m4 15 4.5-4.5L11 13l2-2 3 4"/></svg>
          </span>
          <span data-i18n="nav.resourcepacks">Resource Packs</span>
        </button>
        <button class="nav-item" data-view="versions">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M10 3 3 6.5 10 10l7-3.5L10 3Z"/><path d="M3 6.5V14l7 3.5 7-3.5V6.5"/><path d="M10 10v7.5"/></svg>
          </span>
          <span data-i18n="nav.versions">Versions</span>
        </button>
        <button class="nav-item" data-view="mcsettings">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="4" width="14" height="12" rx="2"/><path d="M6.5 8h1.5M6.5 12h1.5M11 7v3l2 1.5"/></svg>
          </span>
          <span data-i18n="nav.mcsettings">Minecraft 설정</span>
        </button>
        <button class="nav-item" data-view="settings">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><circle cx="10" cy="10" r="2.6"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.1 5.1l1.4 1.4M13.5 13.5l1.4 1.4M5.1 14.9l1.4-1.4M13.5 6.5l1.4-1.4"/></svg>
          </span>
          <span data-i18n="nav.settings">Settings</span>
        </button>
      </nav>
    </aside>

    <main class="content">
      <section class="view" id="view-home"></section>
      <section class="view" id="view-instances" hidden></section>
      <section class="view" id="view-mods" hidden></section>
      <section class="view" id="view-resourcepacks" hidden></section>
      <section class="view" id="view-versions" hidden></section>
      <section class="view" id="view-mcsettings" hidden></section>
      <section class="view" id="view-settings" hidden></section>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal-root"></div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/state.js"></script>
  <script src="js/modPanel.js"></script>
  <script src="js/resourcePackPanel.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/instances.js"></script>
  <script src="js/views/mods.js"></script>
  <script src="js/views/resourcepacks.js"></script>
  <script src="js/views/versions.js"></script>
  <script src="js/views/mcsettings.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
